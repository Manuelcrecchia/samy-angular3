<!DOCTYPE html>
<html lang="it">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gestione Clienti</title>
  </head>
  <body class="bg-light">

    <!-- TOOLBAR -->
    <mat-toolbar
      class="d-flex flex-wrap justify-content-between align-items-center px-3 py-2 mb-3"
      color="primary"
    >
      <div class="d-flex align-items-center mb-2 mb-md-0">
        <span class="fs-4 me-3 text-white">Clienti</span>
        <button class="btn-back me-3" type="button" (click)="back()">
          &larr; Torna Indietro
        </button>
      </div>

      <div class="d-flex flex-wrap gap-2">
        <mat-form-field class="example-form-field" appearance="fill">
          <mat-label>Numero cliente</mat-label>
          <input
            #inputNumeroCliente
            matInput
            (input)="searchNumeroCliente(inputNumeroCliente.value)"
          />
        </mat-form-field>

        <mat-form-field class="example-form-field" appearance="fill">
          <mat-label>Nominativo</mat-label>
          <input
            #inputNominativo
            matInput
            (input)="searchNominativo(inputNominativo.value)"
          />
        </mat-form-field>

        <mat-form-field class="example-form-field" appearance="fill">
          <mat-label>Filtro</mat-label>
          <mat-select (selectionChange)="applyFiltro($event.value)">
            <mat-option value="">Tutti</mat-option>
            <mat-option value="chiave_si">Chiave: Sì</mat-option>
            <mat-option value="chiave_no">Chiave: No</mat-option>
            <mat-option value="ordinario">Ordinario</mat-option>
            <mat-option value="straordinario">Straordinario</mat-option>
          </mat-select>
        </mat-form-field>
      </div>
    </mat-toolbar>

    <!-- LISTA CLIENTI -->
    <div class="container">
      <div class="row g-3">
        <div class="col-12" *ngFor="let customer of customersFrEnd">

          <div class="customer-card">

            <!-- HEADER: apre/chiude tendina -->
            <button
              type="button"
              class="customer-header-btn"
              data-bs-toggle="collapse"
              [attr.data-bs-target]="'#cActions' + customer.numeroCliente"
              aria-expanded="false"
              [attr.aria-controls]="'cActions' + customer.numeroCliente"
            >
              <span class="customer-info">
                <span class="customer-num">{{ customer.numeroCliente }}</span>
                <span class="customer-sep">—</span>
                <span class="customer-nom">{{ customer.nominativo }}</span>
                <span class="badge-tipo ms-2"
                  [ngClass]="customer.tipoCliente === 'S' ? 'badge-straord' : 'badge-ord'">
                  {{ customer.tipoCliente === 'S' ? 'Straord.' : 'Ord.' }}
                </span>
                <span *ngIf="customer.key" class="badge-chiave ms-1">🔑</span>
              </span>

              <span class="d-flex align-items-center gap-2">
                <!-- Pulsante note -->
                <button
                  *ngIf="globalService.hasPermission('CUSTOMERS_NOTES_VIEW')"
                  type="button"
                  class="btn btn-sm btn-notes"
                  (click)="navigateToNotes(customer.numeroCliente, customer.nominativo); $event.stopPropagation()"
                  title="Note"
                >
                  <mat-icon>notes</mat-icon>
                </button>
                <span class="chev">▾</span>
              </span>
            </button>

            <!-- INFO RAPIDE (email + telefono) -->
            <div class="customer-meta-row">
              <span *ngIf="customer.email" class="meta-item">
                <mat-icon>email</mat-icon>{{ customer.email }}
              </span>
              <span *ngIf="customer.telefono" class="meta-item">
                <mat-icon>phone</mat-icon>{{ customer.telefono }}
              </span>
            </div>

            <!-- AZIONI -->
            <div
              class="collapse customer-actions"
              [attr.id]="'cActions' + customer.numeroCliente"
            >
              <div class="customer-actions-inner">

                <button
                  mat-raised-button
                  color="accent"
                  [routerLink]="['/gestioneTagCliente', customer.numeroCliente]"
                >
                  <mat-icon>label</mat-icon>
                </button>

                <button
                  *ngIf="globalService.hasPermission('CUSTOMERS_MANAGE')"
                  mat-raised-button
                  color="accent"
                  (click)="navigateToEditCustomer(customer.numeroCliente)"
                >
                  <mat-icon>edit</mat-icon>
                </button>

                <button
                  *ngIf="globalService.hasPermission('CUSTOMERS_MANAGE')"
                  mat-raised-button
                  color="warn"
                  (click)="exportAndDeleteCustomer(customer)"
                >
                  <mat-icon>delete</mat-icon>
                </button>

                <button
                  mat-raised-button
                  color="primary"
                  (click)="viewDocuments(customer.numeroCliente)"
                >
                  <mat-icon>folder</mat-icon>
                </button>

                <button
                  mat-raised-button
                  color="accent"
                  [routerLink]="['/schedaCliente', customer.numeroCliente]"
                >
                  <mat-icon>person</mat-icon>
                </button>

              </div>
            </div>

          </div>

        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
